services:
  runner:
    build:
      context: ./runner
    image: runner-playwright:latest
    working_dir: /files/runner
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - LLM_PROVIDER=${LLM_PROVIDER:-anthropic}
      - ALURA_EMAIL=${ALURA_EMAIL}
      - ALURA_PASSWORD=${ALURA_PASSWORD}
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-runner}
    volumes:
      - /local-files:/files
    depends_on:
      - postgres

    # (A) Somente rede interna (acesso via http://runner:8000 do n8n)
    networks:
      n8n_net:
        aliases: [runner]
      svc_net: {}
    restart: always

    # (B) OPCIONAL: publicar HTTPS atrás do Traefik (descomente as linhas abaixo)
    # labels:
    #   - traefik.enable=true
    #   - traefik.http.routers.runner.rule=Host(`${RUNNER_SUBDOMAIN}.${DOMAIN_NAME}`)
    #   - traefik.http.routers.runner.tls=true
    #   - traefik.http.routers.runner.entrypoints=web,websecure
    #   - traefik.http.routers.runner.tls.certresolver=mytlschallenge
    #   - traefik.http.services.runner.loadbalancer.server.port=8000
    #   - traefik.docker.network=${TRAEFIK_NETWORK}
    # networks:
    #   n8n_net:
    #     aliases: [runner]
    #   traefik_net: {}

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-runner}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      svc_net: {}
    restart: always

volumes:
  postgres_data:

networks:
  n8n_net:
    external: true
    name: n8n_default
  svc_net:
    external: true
